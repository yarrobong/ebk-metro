<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <meta
      name="description"
      content="Время до следующего поезда и расчёт поездки в Екатеринбургском метрополитене."
    />
    <link rel="canonical" href="https://yarrobong.github.io/ekb-metro/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Метро Екатеринбурга" />
    <meta
      property="og:description"
      content="Время до следующего поезда и расчёт поездки в Екатеринбургском метрополитене."
    />
    <meta property="og:url" content="https://yarrobong.github.io/ekb-metro/" />
    <meta
      property="og:image"
      content="https://yarrobong.github.io/ekb-metro/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Метро Екатеринбурга. Следующий поезд и время поездки."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Метро Екатеринбурга" />
    <meta
      name="twitter:description"
      content="Время до следующего поезда и расчёт поездки в Екатеринбургском метрополитене."
    />
    <meta
      name="twitter:image"
      content="https://yarrobong.github.io/ekb-metro/og-image.png"
    />

    <meta name="theme-color" content="#F4F7F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Метро ЕКБ" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="color-scheme" content="light" />

    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <script>
      (() => {
        const storageKey = "metro-theme";
        const darkColor = "#0B0E12";
        const lightColor = "#F4F7F6";
        let preference = "system";

        try {
          const savedPreference = window.localStorage.getItem(storageKey);
          if (
            savedPreference === "system" ||
            savedPreference === "light" ||
            savedPreference === "dark"
          ) {
            preference = savedPreference;
          }
        } catch {}

        const mediaQuery =
          typeof window.matchMedia === "function"
            ? window.matchMedia("(prefers-color-scheme: dark)")
            : null;
        const theme =
          preference === "dark" ||
          (preference === "system" && mediaQuery && mediaQuery.matches)
            ? "dark"
            : "light";
        const color = theme === "dark" ? darkColor : lightColor;
        const root = document.documentElement;
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        const colorSchemeMeta = document.querySelector('meta[name="color-scheme"]');

        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        root.style.backgroundColor = color;

        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", color);
        }

        if (colorSchemeMeta) {
          colorSchemeMeta.setAttribute("content", theme);
        }
      })();
    </script>

    <style>
      :root {
        --launch-bg: #f4f7f6;
        --launch-bg-top: #ffffff;
        --launch-bg-bottom: #e8efec;
        --launch-text: #101820;
        --launch-muted: #617081;
        --launch-muted-soft: rgba(97, 112, 129, 0.18);
        --launch-accent: #10b981;
        --launch-accent-soft: rgba(110, 231, 183, 0.42);
        --launch-shadow: rgba(16, 24, 32, 0.18);
        color-scheme: light;
        background: var(--launch-bg);
        color: var(--launch-text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
      }

      html[data-theme="dark"] {
        --launch-bg: #0b0e12;
        --launch-bg-top: #131922;
        --launch-bg-bottom: #0b0e12;
        --launch-text: #e2e8f0;
        --launch-muted: #969da8;
        --launch-muted-soft: rgba(148, 163, 184, 0.18);
        --launch-accent: #10b981;
        --launch-accent-soft: rgba(110, 231, 183, 0.4);
        --launch-shadow: rgba(0, 0, 0, 0.24);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--launch-bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(
            circle at top right,
            var(--launch-bg-top),
            var(--launch-bg) 48%,
            var(--launch-bg-bottom)
          ),
          var(--launch-bg);
      }

      #root {
        min-height: 100vh;
      }

      .launch-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      }

      .launch-screen__panel {
        width: min(100%, 520px);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .launch-screen__mark {
        width: 80px;
        height: 80px;
        margin: 0;
      }

      .launch-screen__mark-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 18px 40px var(--launch-shadow));
      }

      .launch-screen__eyebrow {
        margin: 18px 0 0;
        font-size: 12px;
        line-height: 18px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--launch-muted);
      }

      .launch-screen__title {
        margin: 12px 0 0;
        font-size: clamp(32px, 6vw, 42px);
        line-height: 1.05;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .launch-screen__signal {
        width: 72px;
        height: 6px;
        margin-top: 24px;
        padding: 1px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        border-radius: 999px;
        background: var(--launch-muted-soft);
        overflow: hidden;
      }

      .launch-screen__signal-dot {
        width: 22px;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--launch-accent-soft),
          var(--launch-accent) 62%,
          #6ee7b7
        );
        transform: translateX(0);
      }

      .launch-screen__signal-dot--animated {
        animation: launch-slide 1.25s ease-in-out infinite;
      }

      .launch-screen__status {
        min-height: 20px;
        margin: 14px 0 0;
        font-size: 14px;
        line-height: 20px;
        color: var(--launch-muted);
        opacity: 0;
        transition: opacity 140ms ease;
      }

      .launch-screen__status[data-visible="true"] {
        opacity: 1;
      }

      @keyframes launch-slide {
        0%,
        100% {
          transform: translateX(0);
        }

        50% {
          transform: translateX(48px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .launch-screen__signal-dot--animated {
          animation: none;
        }

        .launch-screen__status {
          transition: none;
        }
      }
    </style>

    <title>Метро Екатеринбурга</title>
  </head>

  <body>
    <noscript> Для работы приложения необходимо включить JavaScript. </noscript>

    <div id="root">
      <div class="launch-screen" data-reduced-motion="false">
        <div class="launch-screen__panel">
          <div class="launch-screen__mark" aria-hidden="true">
            <img
              class="launch-screen__mark-image"
              src="%BASE_URL%pwa-192x192.png"
              width="80"
              height="80"
              alt=""
            />
          </div>

          <p class="launch-screen__eyebrow">Екатеринбургский метрополитен</p>
          <h1 class="launch-screen__title">Метро Екатеринбурга</h1>

          <div class="launch-screen__signal" aria-hidden="true">
            <span
              class="launch-screen__signal-dot launch-screen__signal-dot--animated"
            ></span>
          </div>

          <p
            class="launch-screen__status"
            role="status"
            aria-live="polite"
            data-launch-status
            data-visible="false"
          >
            Загружаем расписание
          </p>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const root = document.getElementById("root");
        const status = root?.querySelector("[data-launch-status]");
        const mediaQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
        const launchScreen = root?.querySelector(".launch-screen");

        if (launchScreen) {
          launchScreen.setAttribute("data-reduced-motion", String(mediaQuery.matches));
        }

        const statusTimer = window.setTimeout(() => {
          status?.setAttribute("data-visible", "true");
        }, 160);

        window.addEventListener(
          "load",
          () => {
            window.clearTimeout(statusTimer);
          },
          { once: true },
        );
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
