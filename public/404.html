<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/ekb-metro/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F4F7F6" />
    <meta name="color-scheme" content="light" />
    <script>
      (() => {
        const storageKey = "metro-theme";
        const darkColor = "#0B0E12";
        const lightColor = "#F4F7F6";
        let preference = "system";

        try {
          const savedPreference = window.localStorage.getItem(storageKey);
          if (
            savedPreference === "system" ||
            savedPreference === "light" ||
            savedPreference === "dark"
          ) {
            preference = savedPreference;
          }
        } catch {}

        const mediaQuery =
          typeof window.matchMedia === "function"
            ? window.matchMedia("(prefers-color-scheme: dark)")
            : null;
        const theme =
          preference === "dark" ||
          (preference === "system" && mediaQuery && mediaQuery.matches)
            ? "dark"
            : "light";
        const color = theme === "dark" ? darkColor : lightColor;
        const root = document.documentElement;
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        const colorSchemeMeta = document.querySelector('meta[name="color-scheme"]');

        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        root.style.backgroundColor = color;

        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", color);
        }

        if (colorSchemeMeta) {
          colorSchemeMeta.setAttribute("content", theme);
        }
      })();
    </script>
    <style>
      :root {
        --redirect-bg: #f4f7f6;
        --redirect-text: #617081;
        color-scheme: light;
        background: #f4f7f6;
        color: #617081;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
      }

      html[data-theme="dark"] {
        --redirect-bg: #0b0e12;
        --redirect-text: #969da8;
        color-scheme: dark;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--redirect-bg);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      }

      p {
        margin: 0;
        color: var(--redirect-text);
      }
    </style>
    <title>Перенаправление…</title>
  </head>
  <body>
    <p>Перенаправляем в приложение…</p>
  </body>
</html>
